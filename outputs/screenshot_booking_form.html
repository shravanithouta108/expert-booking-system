
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',system-ui,sans-serif}
.screen{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden}
.nav{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo{color:#4f46e5;font-weight:700;font-size:15px}
.live-dot{display:flex;align-items:center;gap:5px;background:#dcfce7;color:#166534;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px}
.dot{width:6px;height:6px;border-radius:50%;background:#22c55e}
.body{padding:16px 24px;max-width:560px;margin:0 auto}
.back{color:#4f46e5;font-size:11px;margin-bottom:12px}
.page-title{font-size:18px;font-weight:700;color:#0f172a;margin-bottom:14px}
.summary{background:#eef2ff;border:1px solid #c7d2fe;border-radius:12px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.sum-avatar{width:42px;height:42px;border-radius:10px;background:#4f46e5;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.sum-name{font-size:13px;font-weight:600;color:#0f172a;margin-bottom:2px}
.sum-cat{font-size:11px;color:#64748b}
.sum-right{margin-left:auto;text-align:right}
.sum-label{font-size:9px;color:#94a3b8;margin-bottom:2px}
.sum-date{font-size:12px;font-weight:600;color:#4f46e5}
.sum-time{font-size:11px;color:#4338ca}
.form-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px}
.form-title{font-size:13px;font-weight:600;color:#334155;margin-bottom:14px}
.field{margin-bottom:12px}
.label{font-size:11px;font-weight:500;color:#374151;margin-bottom:4px}
.input{width:100%;background:#fff;border:1px solid #d1d5db;border-radius:9px;padding:8px 11px;font-size:12px;color:#374151;outline:none}
.input.disabled{background:#f8fafc;color:#94a3b8}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.textarea{width:100%;background:#fff;border:1px solid #d1d5db;border-radius:9px;padding:8px 11px;font-size:12px;color:#374151;resize:none;height:60px}
.submit{background:#4f46e5;color:#fff;border:none;border-radius:10px;padding:11px;width:100%;font-size:12px;font-weight:600;margin-top:4px;cursor:pointer}
.input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
</style>
<div class="screen">
  <div class="nav">
    <div class="logo">🎯 ExpertConnect</div>
    <div style="display:flex;align-items:center;gap:16px">
      <span style="font-size:12px;color:#64748b">Experts</span>
      <span style="font-size:12px;color:#64748b">My Bookings</span>
      <div class="live-dot"><span class="dot"></span>Live</div>
    </div>
  </div>
  <div class="body">
    <div class="back">← Back</div>
    <div class="page-title">Complete Your Booking</div>
    <div class="summary">
      <div class="sum-avatar">PS</div>
      <div>
        <div class="sum-name">Dr. Priya Sharma</div>
        <div class="sum-cat">💻 Technology</div>
      </div>
      <div class="sum-right">
        <div class="sum-label">Session</div>
        <div class="sum-date">Mon, 12 May 2026</div>
        <div class="sum-time">11:00 AM</div>
      </div>
    </div>
    <div class="form-card">
      <div class="form-title">Your Details</div>
      <div class="field">
        <div class="label">Full Name *</div>
        <input class="input" value="Priya Sharma" readonly />
      </div>
      <div class="field">
        <div class="label">Email Address *</div>
        <input class="input" value="priya@example.com" readonly />
      </div>
      <div class="field">
        <div class="label">Phone Number *</div>
        <input class="input" value="+91 98765 43210" readonly />
      </div>
      <div class="grid2">
        <div class="field">
          <div class="label">Date</div>
          <input class="input disabled" value="2026-05-12" readonly />
        </div>
        <div class="field">
          <div class="label">Time Slot</div>
          <input class="input disabled" value="11:00 AM" readonly />
        </div>
      </div>
      <div class="field">
        <div class="label">Notes / Agenda <span style="color:#94a3b8">(optional)</span></div>
        <textarea class="textarea" readonly>I need help reviewing my system design for a distributed cache layer. Specifically looking at Redis vs Memcached trade-offs.</textarea>
      </div>
      <button class="submit">Confirm Booking →</button>
    </div>
  </div>
</div>
